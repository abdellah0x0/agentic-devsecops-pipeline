name: DevSecOps Pipeline - Vulnerable App

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  IMAGE_NAME: vulnerable-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ============================================
  # JOB 1 : Build + Containerize
  # ============================================
  build:
    name: Build & Containerize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          push: false
          load: true
          outputs: type=docker,dest=/tmp/app.tar

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-image
          path: /tmp/app.tar
          retention-days: 1

  # ============================================
  # JOB 2 : SonarCloud Scan + Quality Gate
  # ============================================
 

  # ============================================
  # JOB 3 : AI Exploit Gate
  # ============================================
  exploit-gate:
    name: AI Exploit Gate
    needs: sonarcloud-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----- 1. Setup Node.js (required for Claude Code CLI) -----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ----- 2. Install Claude Code CLI -----
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # ----- 3. Setup Python -----
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ----- 4. Install Python dependencies -----
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r exploit-gate/requirements.txt

      # ----- 5. Download the app image built in JOB 1 -----
      - name: Download app image
        uses: actions/download-artifact@v4
        with:
          name: app-image
          path: /tmp/

      # ----- 6. Load the Docker image -----
      - name: Load Docker image
        run: docker load -i /tmp/app.tar

      # ----- 7. Spawn ephemeral sandbox -----
      - name: Spawn vulnerable app sandbox
        run: |
          docker run -d \
            --name vuln-sandbox \
            -p 3000:3000 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          
          # Wait for app to be ready
          echo "Waiting for app to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ App is ready"
              break
            fi
            sleep 2
          done
          
          # Verify
          curl -s http://localhost:3000 | head -5

      # ----- 8. Create output directory -----
      - name: Create output directory
        run: mkdir -p output

      # ----- 9. Run AI Exploit Agent -----
      - name: Run Exploit Agent
        env:
          # Auth Claude Code (OAuth Pro)
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          
          # SonarCloud
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: abdellah0x0_agentic-devsecops-pipeline
          SONAR_HOST: https://sonarcloud.io
          
          # Target
          TARGET_URL: http://localhost:3000
          
          # Output
          OUTPUT_DIR: ./output
        run: python exploit-gate/main.py

      # ----- 10. Display report in GitHub UI -----
      - name: Display report summary
        if: always()
        run: |
          if [ -f ./output/report.json ]; then
            echo "## 🤖 AI Exploit Gate Report" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat ./output/report.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No report file generated" >> $GITHUB_STEP_SUMMARY
          fi

      # ----- 11. Upload report as artifact -----
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exploit-report
          path: ./output/
          retention-days: 30

      # ----- 12. Cleanup sandbox -----
      - name: Stop sandbox
        if: always()
        run: |
          docker stop vuln-sandbox || true
          docker rm vuln-sandbox || true

  # ============================================
  # [SLOT FUTUR : Deploy to Render]
  # ============================================