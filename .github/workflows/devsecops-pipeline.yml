name: DevSecOps Pipeline - Detection

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  IMAGE_NAME: vulnerable-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ============================================
  # JOB 1 : Build + Containerize
  # ============================================
  build:
    name: Build & Containerize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          push: false
          load: true
          outputs: type=docker,dest=/tmp/app.tar

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-image
          path: /tmp/app.tar
          retention-days: 1

  # ============================================
  # JOB 2 : SonarCloud Scan
  # ============================================
  sonarcloud-scan:
    name: SonarCloud Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=false

  # ============================================
  # JOB 3 : AI Exploit Gate
  # ============================================
  exploit-gate:
    name: AI Exploit Gate
    needs: sonarcloud-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r exploit-gate/requirements.txt

      - name: Download app image
        uses: actions/download-artifact@v4
        with:
          name: app-image
          path: /tmp/

      - name: Load Docker image
        run: docker load -i /tmp/app.tar

      - name: Spawn vulnerable app sandbox
        run: |
          docker run -d \
            --name vuln-sandbox \
            -p 3000:3000 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

          for i in {1..30}; do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "App is ready"
              break
            fi
            sleep 2
          done

      - name: Create output directory
        run: mkdir -p output

      - name: Run AI Exploit Agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: abdellah0x0_agentic-devsecops-pipeline
          SONAR_HOST: https://sonarcloud.io
          TARGET_URL: http://localhost:3000
          OUTPUT_DIR: ./output
        run: python exploit-gate/main.py

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exploit-report
          path: ./output/
          retention-days: 30

      - name: Comment results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('./output/report.json'));
              const summary = report.summary || {};
              const exploited = summary.exploited_count || 0;
              const total = summary.total_findings || 0;
              const fp = summary.false_positive_count || 0;
              
              let status, statusEmoji;
              if (exploited === 0) {
                status = '**Safe to merge**';
                statusEmoji = '✅';
              } else {
                status = '**Vulnerabilities still exploitable**';
                statusEmoji = '🔴';
              }
              
              const findingsTable = (report.findings || []).map(f => 
                `| ${f.vulnerability_type} | ${f.endpoint} | ${f.exploited ? '🔴 Exploited' : '✅ Safe'} |`
              ).join('\n');
              
              const body = `## ${statusEmoji} AI Exploit Gate Re-validation
              
              ${status}
              
              **Summary:**
              - Total findings: ${total}
              - Exploited: ${exploited}
              - False positives: ${fp}
              
              **Details:**
              | Vulnerability | Endpoint | Status |
              |---------------|----------|--------|
              ${findingsTable}
              
              ${exploited === 0 ? 'The fix successfully addressed all vulnerabilities. You can safely merge this PR.' : 'Some vulnerabilities are still exploitable. Please review the fix.'}`;
              
              github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } catch (e) {
              console.log('Could not post comment:', e.message);
            }

      - name: Stop sandbox
        if: always()
        run: |
          docker stop vuln-sandbox || true
          docker rm vuln-sandbox || true

  # ============================================
  # JOB 4 : Publish Dashboard to GitHub Pages
  # ============================================
  publish-dashboard:
    name: Publish Dashboard
    needs: exploit-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download exploit report
        uses: actions/download-artifact@v4
        with:
          name: exploit-report
          path: ./output/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate dashboard HTML
        run: |
          mkdir -p dashboard
          python dashboard/dashboard.py \
            --report output/report.json \
            --output dashboard/index.html \
            --repo ${{ github.repository }} \
            --commit ${{ github.sha }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          force_orphan: true