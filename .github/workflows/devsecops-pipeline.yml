name: DevSecOps Pipeline - Juice Shop

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  IMAGE_NAME: juice-shop
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ============================================
  # JOB 1 : Build + Containerize
  # ============================================
  build:
    name: Build & Containerize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./juice-shop-app
          file: ./juice-shop-app/Dockerfile
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          push: false
          load: true
          outputs: type=docker,dest=/tmp/juice-shop-image.tar

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: juice-shop-image
          path: /tmp/juice-shop-image.tar
          retention-days: 1

  # ============================================
  # JOB 2 : SonarCloud Scan + Quality Gate
  # ============================================
  sonarcloud-scan:
    name: SonarCloud Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

  # ============================================
  # [SLOT FUTUR : AI Exploit Gate]
  # ============================================

  # ============================================
  # [SLOT FUTUR : Deploy to Render]
  # ============================================