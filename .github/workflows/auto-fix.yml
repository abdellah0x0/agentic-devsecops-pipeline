name: AI Auto-Fix Agent

on:
  issues:
    types: [opened, labeled]

jobs:
  # ============================================
  # JOB 1: Detect intent and ensure label
  # ============================================
  detect-intent:
    name: Detect Auto-Fix Intent
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      should_fix: ${{ steps.check.outputs.should_fix }}
    steps:
      - name: Check if this is an auto-fix request
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            const title = (issue.title || '').toLowerCase();
            const body = (issue.body || '').toLowerCase();
            
            const hasLabel = labels.includes('auto-fix');
            const titleMatch = title.includes('auto-fix') || 
                              title.includes('ai fix') || 
                              title.includes('🤖');
            const bodyMatch = body.includes('finding_key') || 
                             body.includes('vulnerabilities to fix');
            
            const shouldFix = hasLabel || titleMatch || bodyMatch;
            
            console.log(`Labels: ${labels.join(', ')}`);
            console.log(`Has label: ${hasLabel}`);
            console.log(`Title match: ${titleMatch}`);
            console.log(`Body match: ${bodyMatch}`);
            console.log(`Should fix: ${shouldFix}`);
            
            // If detected via title/body but label is missing, add it
            if (shouldFix && !hasLabel) {
              console.log('Adding auto-fix label...');
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['auto-fix']
                });
              } catch (e) {
                console.log('Label not found, creating it...');
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: 'auto-fix',
                    color: 'E24B4A',
                    description: 'Trigger AI Fix Agent'
                  });
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    labels: ['auto-fix']
                  });
                } catch (innerErr) {
                  console.log('Could not create label:', innerErr.message);
                }
              }
            }
            
            core.setOutput('should_fix', shouldFix);

  # ============================================
  # JOB 2: Run the fix agent
  # ============================================
  fix:
    name: Run AI Fix Agent
    needs: detect-intent
    if: needs.detect-intent.outputs.should_fix == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Comment on issue - starting
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'AI Fix Agent is starting... This may take 2-3 minutes.\n\nFollow progress in the [Actions tab](' + context.payload.repository.html_url + '/actions).'
            })

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r fix-agent/requirements.txt

      - name: Configure git
        run: |
          git config user.name "AI Fix Agent"
          git config user.email "ai-agent@noreply.github.com"

      # ============================================
      # CRITICAL: Cleanup any existing branch/PR before creating new one
      # This fixes the "non-fast-forward" error
      # ============================================
      - name: Cleanup any existing branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto-fix/issue-${{ github.event.issue.number }}"
          
          # Close any existing open PR for this branch
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ]; then
            echo "Closing existing PR #$PR_NUMBER"
            gh pr close "$PR_NUMBER" --comment "Closing - new fix attempt in progress" || true
          fi
          
          # Delete the remote branch if it exists
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Deleting existing remote branch: $BRANCH"
            git push origin --delete "$BRANCH" || true
          fi

      - name: Create fix branch
        id: branch
        run: |
          BRANCH="auto-fix/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run AI Fix Agent (fixes ALL findings)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: abdellah0x0_agentic-devsecops-pipeline
          SONAR_HOST: https://sonarcloud.io
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OUTPUT_DIR: ./fix-output
        run: |
          mkdir -p fix-output
          python fix-agent/main.py

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes were made by the agent"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Agent made changes, will create PR"
          fi

      - name: Commit and force-push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git commit -m "AI Fix for issue #${{ github.event.issue.number }}

          Auto-generated security fix by Claude Agent.
          Closes #${{ github.event.issue.number }}"
          # Use --force-with-lease as safety net for race conditions
          git push --force-with-lease origin ${{ steps.branch.outputs.branch }}

      - name: Ensure PR labels exist
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "ai-generated" --color "8B5CF6" --description "Created by AI agent" 2>/dev/null || true
          gh label create "security-fix" --color "E24B4A" --description "Security vulnerability fix" 2>/dev/null || true

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "AI Security Fix for issue #${{ github.event.issue.number }}" \
            --body "## 🛡️ Auto-generated Security Fix

          This PR was automatically generated by the **Claude AI Fix Agent** to address security vulnerabilities.

          **Closes #${{ github.event.issue.number }}**

          ### What was fixed
          $(cat fix-output/summary.md 2>/dev/null || echo 'See diff for details')

          ### Validation
          The DevSecOps pipeline will automatically:
          1. Re-build the application
          2. Re-scan with SonarCloud
          3. Re-run the AI Exploit Gate
          4. Comment the results on this PR

          **Please review the changes carefully before merging.**

          ---
          *Generated by Claude Sonnet 4.6 via the Agent SDK*" \
            --base main \
            --head ${{ steps.branch.outputs.branch }} \
            --label "ai-generated" \
            --label "security-fix"

      - name: Comment on issue with PR link
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:auto-fix/issue-${context.issue.number}`
            });
            
            const prUrl = prs.data[0]?.html_url || 'Check the Pull Requests tab';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `AI Fix Agent has created a Pull Request: ${prUrl}\n\nThe security pipeline will re-validate the fix automatically.`
            })

      - name: Comment on issue - no changes
        if: steps.changes.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'AI Fix Agent ran but did not make any changes. Manual review needed.'
            })