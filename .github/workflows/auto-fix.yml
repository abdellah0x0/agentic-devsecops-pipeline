name: AI Auto-Fix Agent

on:
  issues:
    types: [opened, labeled]

jobs:
  fix:
    name: Run AI Fix Agent
    if: contains(github.event.issue.labels.*.name, 'auto-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Comment on issue - starting
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'AI Fix Agent is starting... This may take 2-3 minutes.'
            })

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r fix-agent/requirements.txt

      - name: Configure git
        run: |
          git config user.name "AI Fix Agent"
          git config user.email "ai-agent@noreply.github.com"

      - name: Create fix branch
        id: branch
        run: |
          BRANCH="auto-fix/issue-${{ github.event.issue.number }}"
          git checkout -b $BRANCH
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run AI Fix Agent (fixes ALL findings)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: abdellah0x0_agentic-devsecops-pipeline
          SONAR_HOST: https://sonarcloud.io
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OUTPUT_DIR: ./fix-output
        run: |
          mkdir -p fix-output
          python fix-agent/main.py

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes were made by the agent"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Agent made changes, will create PR"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git commit -m " AI Fix for issue #${{ github.event.issue.number }}

          Auto-generated security fix by Claude Agent.
          Closes #${{ github.event.issue.number }}"
          git push origin ${{ steps.branch.outputs.branch }}

      - name: Read fix summary
        if: steps.changes.outputs.has_changes == 'true'
        id: summary
        run: |
          if [ -f fix-output/summary.md ]; then
            SUMMARY=$(cat fix-output/summary.md)
            # Escape for GitHub Actions
            SUMMARY="${SUMMARY//'%'/'%25'}"
            SUMMARY="${SUMMARY//$'\n'/'%0A'}"
            SUMMARY="${SUMMARY//$'\r'/'%0D'}"
            echo "content=$SUMMARY" >> $GITHUB_OUTPUT
          else
            echo "content=AI Fix Agent applied security patches." >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title " AI Security Fix for issue #${{ github.event.issue.number }}" \
            --body "## 🛡️ Auto-generated Security Fix

          This PR was automatically generated by the **Claude AI Fix Agent** to address security vulnerabilities.

          **Closes #${{ github.event.issue.number }}**

          ### What was fixed
          $(cat fix-output/summary.md 2>/dev/null || echo 'See diff for details')

          ### Validation
          The DevSecOps pipeline will automatically:
          1. Re-build the application
          2. Re-scan with SonarCloud
          3. Re-run the AI Exploit Gate
          4. Comment the results on this PR

           **Please review the changes carefully before merging.**

          ---
          *Generated by Claude Sonnet 4.6 via the Agent SDK*" \
            --base main \
            --head ${{ steps.branch.outputs.branch }} \
            --label "ai-generated" \
            --label "security-fix"

      - name: Comment on issue - completed
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'AI Fix Agent has created a Pull Request. Please review and merge if satisfied.'
            })

      - name: Comment on issue - no changes
        if: steps.changes.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'AI Fix Agent ran but did not make any changes. Manual review needed.'
            })